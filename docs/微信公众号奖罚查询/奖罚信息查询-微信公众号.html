<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>奖罚信息查询 · 微信公众号原型</title>
  <style>
    :root {
      --primary: #8b6fe8;
      --primary-soft: #f3effc;
      --primary-border: #b9a6f0;
      --header-bg: #ebe8ff;
      --page-bg: #f5f5f5;
      --text: #333333;
      --text-secondary: #666666;
      --text-muted: #999999;
      --line: #eeeeee;
      --money: #1aad19;
      --phone-w: 375px;
      --phone-h: 780px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue",
        "Microsoft YaHei", sans-serif;
      background: #e8e8e8;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 40px;
    }

    .proto-note {
      width: min(var(--phone-w), 100%);
      margin-bottom: 12px;
      font-size: 12px;
      color: #666;
      line-height: 1.5;
    }

    .phone {
      width: min(var(--phone-w), 100%);
      height: var(--phone-h);
      background: #fff;
      border-radius: 28px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    /* 真机（窄屏）访问时：去掉演示外壳，占满整屏，优先展示最上面的内容 */
    @media (max-width: 480px) {
      body {
        padding: 0;
        display: block;
        background: #fff;
      }

      .proto-note { display: none; }

      .phone {
        width: 100%;
        height: 100vh;
        height: 100dvh;
        border-radius: 0;
        box-shadow: none;
      }
    }

    /* —— 顶栏 —— */
    .nav {
      flex-shrink: 0;
      height: 44px;
      background: var(--header-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 0 12px;
    }

    .nav-title {
      font-size: 17px;
      font-weight: 500;
      color: #1a1a1a;
    }

    .nav-capsule {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      height: 28px;
      padding: 0 8px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(0, 0, 0, 0.08);
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #333;
    }

    .nav-capsule span { opacity: 0.7; }

    /* —— 可滚动主体 —— */
    .scroll {
      flex: 1;
      overflow-y: auto;
      background: var(--page-bg);
      -webkit-overflow-scrolling: touch;
    }

    .profile {
      background: var(--header-bg);
      padding: 8px 16px 16px;
    }

    .avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(145deg, #c4b5f5, #8b6fe8);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 22px;
      box-shadow: 0 2px 8px rgba(139, 111, 232, 0.35);
    }

    .date-bar {
      background: #fff;
      height: 44px;
      padding: 0 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid var(--line);
      cursor: pointer;
      user-select: none;
    }

    .date-bar:active { background: #fafafa; }

    .date-icon {
      width: 18px;
      height: 18px;
      color: var(--primary);
      flex-shrink: 0;
    }

    .date-text {
      flex: 1;
      font-size: 13px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .date-arrow {
      color: #bbb;
      font-size: 10px;
      flex-shrink: 0;
    }

    .summary {
      background: #f7f7f7;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: space-around;
      font-size: 13px;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--line);
    }

    .summary strong {
      font-weight: 600;
      color: var(--money);
      margin-left: 2px;
    }

    .list-wrap {
      padding: 10px 12px 24px;
    }

    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
      overflow: hidden;
      margin-bottom: 10px;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 14px 10px;
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }

    .section-title::before {
      content: "";
      width: 4px;
      height: 14px;
      border-radius: 2px;
      background: var(--primary);
      flex-shrink: 0;
    }

    .row {
      display: flex;
      align-items: center;
      min-height: 44px;
      padding: 10px 14px;
      border-top: 1px solid var(--line);
      font-size: 14px;
      gap: 8px;
    }

    .card .row:first-of-type { border-top: 1px solid var(--line); }

    .row-name {
      flex: 1;
      color: var(--text);
      line-height: 1.35;
      min-width: 0;
      word-break: break-all;
    }

    .row-vals {
      flex-shrink: 0;
      display: flex;
      gap: 16px;
      color: var(--text-secondary);
      font-size: 13px;
      white-space: nowrap;
    }

    /* —— 时间选择弹层 —— */
    .mask {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      z-index: 20;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .mask.open {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .sheet {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 30;
      background: #fff;
      border-radius: 12px 12px 0 0;
      transform: translateY(100%);
      visibility: hidden;
      transition: transform 0.25s ease, visibility 0.25s;
      padding-bottom: env(safe-area-inset-bottom, 0);
    }

    .sheet.open {
      transform: translateY(0);
      visibility: visible;
    }

    .sheet-hd {
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      font-size: 16px;
      font-weight: 500;
    }

    .sheet-close {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 28px;
      height: 28px;
      border: none;
      background: transparent;
      font-size: 18px;
      color: #999;
      cursor: pointer;
      line-height: 1;
    }

    .quick {
      display: flex;
      gap: 12px;
      padding: 4px 20px 12px;
    }

    .quick-btn {
      flex: 1;
      height: 36px;
      border-radius: 4px;
      border: 1px solid #ddd;
      background: #fff;
      color: var(--text-secondary);
      font-size: 14px;
      cursor: pointer;
    }

    .quick-btn.active {
      border-color: var(--primary);
      background: var(--primary-soft);
      color: var(--primary);
    }

    .range-display {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 8px 20px 16px;
      font-size: 15px;
    }

    .range-side {
      text-align: center;
      min-width: 96px;
      padding-bottom: 6px;
      border-bottom: 2px solid #ddd;
      color: var(--text);
      cursor: pointer;
    }

    .range-side.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    .picker {
      height: 180px;
      display: flex;
      position: relative;
      overflow: hidden;
      margin: 0 12px;
    }

    .picker::before,
    .picker::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      height: 60px;
      z-index: 2;
      pointer-events: none;
    }

    .picker::before {
      top: 0;
      background: linear-gradient(to bottom, rgba(255,255,255,0.95), rgba(255,255,255,0.4));
    }

    .picker::after {
      bottom: 0;
      background: linear-gradient(to top, rgba(255,255,255,0.95), rgba(255,255,255,0.4));
    }

    .picker-hl {
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      height: 36px;
      margin-top: -18px;
      background: #f5f5f5;
      border-radius: 4px;
      z-index: 0;
      pointer-events: none;
    }

    .col {
      flex: 1;
      overflow-y: auto;
      scroll-snap-type: y mandatory;
      z-index: 1;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .col::-webkit-scrollbar { display: none; }

    .col-item {
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      color: #bbb;
      scroll-snap-align: center;
    }

    .col-item.selected { color: var(--text); font-weight: 500; }

    .sheet-ft {
      display: flex;
      gap: 12px;
      padding: 16px 20px 20px;
    }

    .btn {
      flex: 1;
      height: 44px;
      border-radius: 4px;
      font-size: 16px;
      cursor: pointer;
    }

    .btn-reset {
      background: #fff;
      border: 1px solid #ddd;
      color: var(--text);
    }

    .btn-ok {
      background: var(--primary);
      border: none;
      color: #fff;
    }

    .pad { height: 72px; } /* 滚轮上下留白 */
  </style>
</head>
<body>
  <p class="proto-note">
    原型：微信公众号「奖罚信息查询」现有页还原（线框可点）。点击日期栏可打开时间选择；数据为演示占位。
  </p>

  <div class="phone" id="phone">
    <div class="nav">
      <div class="nav-title">奖罚信息查询</div>
      <div class="nav-capsule" aria-hidden="true">
        <span>···</span>
        <span>—</span>
        <span>○</span>
      </div>
    </div>

    <div class="scroll" id="mainScroll">
      <div class="profile">
        <div class="avatar" title="头像占位">👤</div>
      </div>

      <div class="date-bar" id="dateBar" role="button" tabindex="0">
        <svg class="date-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="5" width="18" height="16" rx="2" />
          <path d="M3 10h18M8 3v4M16 3v4" />
        </svg>
        <div class="date-text" id="dateText">2026-07-01 00:00:00—2026-07-15 23:59:59</div>
        <span class="date-arrow">▼</span>
      </div>

      <div class="summary">
        <div>发放 <strong id="sumIssue">0</strong></div>
        <div>扣除 <strong id="sumDeduct">0</strong></div>
        <div>实际金额 <strong id="sumActual">¥0</strong></div>
      </div>

      <div class="list-wrap" id="listWrap"></div>
    </div>

    <div class="mask" id="mask"></div>

    <div class="sheet" id="sheet" aria-hidden="true">
      <div class="sheet-hd">
        请选择时间
        <button type="button" class="sheet-close" id="sheetClose" aria-label="关闭">×</button>
      </div>
      <div class="quick">
        <button type="button" class="quick-btn active" data-quick="current">当月</button>
        <button type="button" class="quick-btn" data-quick="last">上月</button>
      </div>
      <div class="range-display">
        <div class="range-side active" id="startSide" data-side="start">2026-07-01</div>
        <span>至</span>
        <div class="range-side" id="endSide" data-side="end">2026-07-15</div>
      </div>
      <div class="picker">
        <div class="picker-hl"></div>
        <div class="col" id="yearCol"></div>
        <div class="col" id="monthCol"></div>
        <div class="col" id="dayCol"></div>
      </div>
      <div class="sheet-ft">
        <button type="button" class="btn btn-reset" id="btnReset">重置</button>
        <button type="button" class="btn btn-ok" id="btnOk">确定</button>
      </div>
    </div>
  </div>

  <script>
    /** 按现有截图还原的分组与明细项（金额占位） */
    const SECTIONS = [
      {
        title: "转运质量奖金",
        items: [
          "差错",
          "装载率",
          "破损修复",
          "严重破损上报",
          "遗失",
          "无头件操作补贴",
          "VIP操作补贴",
          "派送部改单自提补贴",
          "合托",
          "双库倒货补贴",
          "查重查方",
          "破损",
          "VIP与48小时留仓",
          "执行力",
          "分批配载",
          "漏扫",
          "干线错扫交接单",
          "到车封签核对不一致",
          "双库混交接",
          "严重错分",
          "改单件未按规定转出",
          "移动错分",
          "移动错分归位",
          "转退件未按规定转出",
          "转退件按规定转出",
          "发流水线分拨未分货"
        ]
      },
      {
        title: "分拨内部质量奖金",
        items: [
          "移动错放货区",
          "卸车混卸",
          "内部野蛮操作",
          "分拨内部执行力",
          "电叉扫描未拉货",
          "挑货等货"
        ]
      }
    ];

    function renderList() {
      const wrap = document.getElementById("listWrap");
      wrap.innerHTML = SECTIONS.map((sec) => {
        const rows = sec.items
          .map(
            (name) => `
          <div class="row">
            <div class="row-name">${name}</div>
            <div class="row-vals"><span>发放 0</span><span>扣除 0</span></div>
          </div>`
          )
          .join("");
        return `
          <div class="card">
            <div class="section-title">${sec.title}</div>
            ${rows}
          </div>`;
      }).join("");
    }

    /* —— 时间选择 —— */
    const state = {
      editing: "start",
      start: { y: 2026, m: 7, d: 1 },
      end: { y: 2026, m: 7, d: 15 },
      appliedStart: null,
      appliedEnd: null
    };
    state.appliedStart = { ...state.start };
    state.appliedEnd = { ...state.end };

    function pad2(n) {
      return String(n).padStart(2, "0");
    }

    function fmtDate(o) {
      return `${o.y}-${pad2(o.m)}-${pad2(o.d)}`;
    }

    function fmtRange(s, e) {
      return `${fmtDate(s)} 00:00:00—${fmtDate(e)} 23:59:59`;
    }

    function daysInMonth(y, m) {
      return new Date(y, m, 0).getDate();
    }

    function syncRangeLabel() {
      document.getElementById("startSide").textContent = fmtDate(state.start);
      document.getElementById("endSide").textContent = fmtDate(state.end);
      document.getElementById("dateText").textContent = fmtRange(
        state.appliedStart,
        state.appliedEnd
      );
    }

    function currentEdit() {
      return state.editing === "start" ? state.start : state.end;
    }

    function buildCols() {
      const yearCol = document.getElementById("yearCol");
      const monthCol = document.getElementById("monthCol");
      const dayCol = document.getElementById("dayCol");
      const cur = currentEdit();
      const years = [];
      for (let y = 2020; y <= 2030; y++) years.push(y);

      yearCol.innerHTML =
        '<div class="pad"></div>' +
        years
          .map(
            (y) =>
              `<div class="col-item${y === cur.y ? " selected" : ""}" data-v="${y}">${y}年</div>`
          )
          .join("") +
        '<div class="pad"></div>';

      monthCol.innerHTML =
        '<div class="pad"></div>' +
        Array.from({ length: 12 }, (_, i) => i + 1)
          .map(
            (m) =>
              `<div class="col-item${m === cur.m ? " selected" : ""}" data-v="${m}">${pad2(m)}月</div>`
          )
          .join("") +
        '<div class="pad"></div>';

      const maxD = daysInMonth(cur.y, cur.m);
      if (cur.d > maxD) cur.d = maxD;
      dayCol.innerHTML =
        '<div class="pad"></div>' +
        Array.from({ length: maxD }, (_, i) => i + 1)
          .map(
            (d) =>
              `<div class="col-item${d === cur.d ? " selected" : ""}" data-v="${d}">${pad2(d)}日</div>`
          )
          .join("") +
        '<div class="pad"></div>';

      requestAnimationFrame(() => {
        scrollToValue(yearCol, cur.y);
        scrollToValue(monthCol, cur.m);
        scrollToValue(dayCol, cur.d);
      });
    }

    function scrollToValue(col, v) {
      const el = col.querySelector(`.col-item[data-v="${v}"]`);
      if (!el) return;
      /* 直接设置容器自身 scrollTop，避免 scrollIntoView 冒泡带动外层页面/列表一起滚动 */
      col.scrollTop = el.offsetTop - col.clientHeight / 2 + el.offsetHeight / 2;
    }

    function onColScroll(col, key) {
      const items = [...col.querySelectorAll(".col-item")];
      const mid = col.getBoundingClientRect().top + col.clientHeight / 2;
      let best = null;
      let bestDist = Infinity;
      items.forEach((el) => {
        const r = el.getBoundingClientRect();
        const c = r.top + r.height / 2;
        const dist = Math.abs(c - mid);
        if (dist < bestDist) {
          bestDist = dist;
          best = el;
        }
      });
      if (!best) return;
      items.forEach((el) => el.classList.toggle("selected", el === best));
      const v = Number(best.dataset.v);
      const cur = currentEdit();
      if (cur[key] !== v) {
        cur[key] = v;
        if (key !== "d") buildCols();
        else syncRangeLabel();
        syncRangeLabel();
      }
    }

    function bindCol(col, key) {
      let t;
      col.addEventListener("scroll", () => {
        clearTimeout(t);
        t = setTimeout(() => onColScroll(col, key), 80);
      });
    }

    function openSheet() {
      state.start = { ...state.appliedStart };
      state.end = { ...state.appliedEnd };
      state.editing = "start";
      document.getElementById("startSide").classList.add("active");
      document.getElementById("endSide").classList.remove("active");
      document.querySelectorAll(".quick-btn").forEach((b) => b.classList.remove("active"));
      syncRangeLabel();
      buildCols();
      document.getElementById("mask").classList.add("open");
      document.getElementById("sheet").classList.add("open");
      document.getElementById("sheet").setAttribute("aria-hidden", "false");
    }

    function closeSheet() {
      document.getElementById("mask").classList.remove("open");
      document.getElementById("sheet").classList.remove("open");
      document.getElementById("sheet").setAttribute("aria-hidden", "true");
    }

    function setMonthRange(which) {
      const now = new Date(2026, 6, 15); // 与截图演示日对齐：2026-07-15
      let y = now.getFullYear();
      let m = now.getMonth() + 1;
      if (which === "last") {
        m -= 1;
        if (m < 1) {
          m = 12;
          y -= 1;
        }
      }
      const lastDay = daysInMonth(y, m);
      const endD = which === "current" ? Math.min(now.getDate(), lastDay) : lastDay;
      state.start = { y, m, d: 1 };
      state.end = { y, m, d: endD };
      state.editing = "start";
      document.getElementById("startSide").classList.add("active");
      document.getElementById("endSide").classList.remove("active");
      syncRangeLabel();
      buildCols();
    }

    /* init */
    if ("scrollRestoration" in history) history.scrollRestoration = "manual";
    renderList();
    syncRangeLabel();
    buildCols();
    window.scrollTo(0, 0);
    document.getElementById("mainScroll").scrollTop = 0;
    bindCol(document.getElementById("yearCol"), "y");
    bindCol(document.getElementById("monthCol"), "m");
    bindCol(document.getElementById("dayCol"), "d");

    document.getElementById("dateBar").addEventListener("click", openSheet);
    document.getElementById("mask").addEventListener("click", closeSheet);
    document.getElementById("sheetClose").addEventListener("click", closeSheet);

    document.getElementById("startSide").addEventListener("click", () => {
      state.editing = "start";
      document.getElementById("startSide").classList.add("active");
      document.getElementById("endSide").classList.remove("active");
      buildCols();
    });
    document.getElementById("endSide").addEventListener("click", () => {
      state.editing = "end";
      document.getElementById("endSide").classList.add("active");
      document.getElementById("startSide").classList.remove("active");
      buildCols();
    });

    document.querySelectorAll(".quick-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".quick-btn").forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        setMonthRange(btn.dataset.quick);
      });
    });

    document.getElementById("btnReset").addEventListener("click", () => {
      document.querySelectorAll(".quick-btn").forEach((b) => b.classList.remove("active"));
      document.querySelector('[data-quick="current"]').classList.add("active");
      setMonthRange("current");
    });

    document.getElementById("btnOk").addEventListener("click", () => {
      state.appliedStart = { ...state.start };
      state.appliedEnd = { ...state.end };
      syncRangeLabel();
      closeSheet();
    });
  </script>
</body>
</html>
