<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>奖罚类型维护 · 个人奖罚总额限额原型</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #1890ff;
      --primary-hover: #40a9ff;
      --sidebar-bg: #001529;
      --sidebar-sub: #000c17;
      --sidebar-text: rgba(255,255,255,.65);
      --sidebar-text-active: #fff;
      --bg: #f0f2f5;
      --card: #fff;
      --border: #e8e8e8;
      --text: rgba(0,0,0,.85);
      --text-secondary: rgba(0,0,0,.45);
      --sidebar-width: 200px;
      --sidebar-collapsed: 64px;
      --header-height: 40px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      overflow: hidden;
    }

    .layout { display: flex; height: 100vh; }

    .sidebar {
      width: var(--sidebar-width);
      background: var(--sidebar-bg);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      transition: width .2s;
      overflow: hidden;
    }
    .sidebar.collapsed { width: var(--sidebar-collapsed); }

    .sidebar-logo {
      height: 48px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 10px;
      border-bottom: 1px solid rgba(255,255,255,.08);
      color: #fff;
      font-weight: 600;
      white-space: nowrap;
    }
    .sidebar-logo .logo-icon {
      width: 28px; height: 28px;
      background: var(--primary);
      border-radius: 4px;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
    }
    .sidebar.collapsed .logo-text { display: none; }

    .sidebar-menu { flex: 1; overflow-y: auto; padding: 8px 0; }

    .menu-item {
      display: flex;
      align-items: center;
      padding: 0 16px;
      height: 40px;
      color: var(--sidebar-text);
      cursor: pointer;
      white-space: nowrap;
      gap: 10px;
      font-size: 14px;
    }
    .menu-item:hover { color: var(--sidebar-text-active); }
    .menu-item.active { background: var(--primary); color: #fff; }
    .menu-item .menu-icon { width: 16px; text-align: center; flex-shrink: 0; opacity: .75; }
    .menu-item .menu-arrow { margin-left: auto; font-size: 10px; opacity: .5; }
    .sidebar.collapsed .menu-label,
    .sidebar.collapsed .menu-arrow { display: none; }

    .menu-sub { background: var(--sidebar-sub); }
    .menu-sub .menu-item { padding-left: 48px; height: 36px; font-size: 13px; }
    .sidebar.collapsed .menu-sub { display: none; }

    .sidebar-toggle {
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--sidebar-text);
      cursor: pointer;
      border-top: 1px solid rgba(255,255,255,.08);
      font-size: 16px;
    }
    .sidebar-toggle:hover { color: #fff; }

    .main-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

    .top-tabs {
      height: var(--header-height);
      background: var(--card);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 8px;
      flex-shrink: 0;
    }
    .top-tabs .home-btn {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-secondary);
      cursor: pointer;
      border-radius: 4px;
      font-size: 16px;
    }
    .top-tabs .home-btn:hover { color: var(--primary); }

    .page-tabs {
      display: flex;
      align-items: center;
      flex: 1;
      overflow-x: auto;
      gap: 2px;
      padding: 0 4px;
    }
    .page-tab {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 12px;
      height: 32px;
      border-radius: 4px;
      color: var(--text-secondary);
      cursor: pointer;
      white-space: nowrap;
      font-size: 13px;
    }
    .page-tab:hover { color: var(--text); background: #fafafa; }
    .page-tab.active { color: var(--primary); background: #e6f7ff; }
    .page-tab .tab-close { font-size: 12px; opacity: .4; margin-left: 2px; }
    .page-tab .tab-close:hover { opacity: 1; color: #ff4d4f; }

    .top-right {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 12px;
      color: var(--text-secondary);
      flex-shrink: 0;
    }
    .top-right .icon-btn { cursor: pointer; font-size: 16px; }
    .top-right .icon-btn:hover { color: var(--primary); }
    .avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: #ccc;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; color: #fff;
      cursor: pointer;
    }

    .content-area { flex: 1; overflow-y: auto; padding: 16px; }
    .content-card {
      background: var(--card);
      border-radius: 4px;
      padding: 16px;
      min-height: calc(100vh - var(--header-height) - 32px);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .filter-area {
      display: flex;
      align-items: flex-end;
      gap: 16px;
    }
    .filter-grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px 24px;
      align-items: center;
    }
    .filter-item {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
    .filter-item .filter-label {
      flex: 0 0 96px;
      text-align: right;
      font-size: 14px;
      color: var(--text);
      white-space: nowrap;
    }
    .filter-item .filter-control-wrap {
      flex: 1;
      min-width: 0;
    }
    .filter-item .filter-control-wrap > .filter-control,
    .filter-item .filter-control-wrap > .select-wrap {
      width: 100%;
    }
    .filter-control {
      width: 100%;
      height: 32px;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0 11px;
      font-size: 14px;
      color: var(--text);
      background: #fff;
      outline: none;
    }
    .filter-control:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(24,144,255,.2); }
    .filter-control:disabled { background: #f5f5f5; color: #bfbfbf; cursor: not-allowed; }
    .filter-control::placeholder { color: #bfbfbf; }

    .select-wrap { position: relative; }
    .select-wrap .filter-control {
      appearance: none;
      padding-right: 28px;
      cursor: pointer;
      color: var(--text-secondary);
    }
    .select-wrap .filter-control:disabled { cursor: not-allowed; }
    .select-wrap::after {
      content: "▼";
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 10px;
      color: var(--text-secondary);
      pointer-events: none;
    }

    .filter-actions { display: flex; gap: 8px; flex-shrink: 0; padding-bottom: 1px; }
    .btn {
      height: 32px;
      padding: 0 16px;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      white-space: nowrap;
    }
    .btn:hover { color: var(--primary); border-color: var(--primary); }
    .btn-primary { background: var(--primary); border-color: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-hover); border-color: var(--primary-hover); color: #fff; }

    .content-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); }
    .content-tab {
      padding: 8px 16px;
      cursor: pointer;
      color: var(--text);
      font-size: 14px;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }
    .content-tab:hover { color: var(--primary); }
    .content-tab.active { color: var(--primary); border-bottom-color: var(--primary); }

    .action-bar { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn-action {
      height: 32px;
      padding: 0 15px;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
    }
    .btn-action.primary { background: var(--primary); border-color: var(--primary); color: #fff; }
    .btn-action:hover:not(:disabled) { opacity: .85; }
    .btn-action:disabled { opacity: .45; cursor: not-allowed; }
    .btn-action.hidden { display: none; }

    .table-area { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .table-scroll { overflow: auto; }
    .data-table { width: 100%; border-collapse: collapse; font-size: 14px; min-width: 1100px; }
    .data-table th,
    .data-table td { border: 1px solid var(--border); padding: 10px 12px; text-align: center; white-space: nowrap; }
    .data-table th { background: #fafafa; font-weight: 500; color: var(--text); }
    .data-table tbody tr:hover { background: #fafafa; }
    .data-table tbody tr.selected { background: #e6f7ff; }
    .col-checkbox { width: 48px; text-align: center !important; }
    .col-checkbox input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; accent-color: var(--primary); }
    .cell-placeholder { color: var(--text-secondary); }

    .pagination {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      padding-top: 16px;
      font-size: 13px;
      color: var(--text-secondary);
    }
    .pagination .total { margin-right: 8px; }
    .page-btn {
      min-width: 32px; height: 32px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      font-size: 13px;
      color: var(--text);
      display: flex; align-items: center; justify-content: center;
      padding: 0 8px;
    }
    .page-btn:hover { color: var(--primary); border-color: var(--primary); }
    .page-btn.active { color: var(--primary); border-color: var(--primary); }
    .page-btn.disabled { opacity: .4; cursor: not-allowed; }
    .page-jump { display: flex; align-items: center; gap: 6px; margin-left: 8px; }
    .page-jump input {
      width: 48px; height: 32px;
      border: 1px solid var(--border);
      border-radius: 4px;
      text-align: center;
      font-size: 13px;
      outline: none;
    }

    .modal-mask {
      position: fixed; inset: 0; z-index: 10;
      display: none; align-items: center; justify-content: center;
      background: rgba(0, 0, 0, .45);
    }
    .modal-mask.open { display: flex; }
    .modal {
      width: 560px; max-height: 90vh; background: #fff; border-radius: 4px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, .2);
      display: flex; flex-direction: column;
    }
    .modal.wide { width: 860px; }
    .modal.xwide { width: 980px; }
    .modal.confirm { width: 420px; }
    .confirm-body {
      padding: 28px 24px 12px;
      color: var(--text);
      line-height: 1.6;
      font-size: 14px;
    }
    .modal-header {
      height: 48px; padding: 0 20px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      font-size: 16px; font-weight: 500; flex-shrink: 0;
    }
    .modal-close { border: 0; background: transparent; color: var(--text-secondary); cursor: pointer; font-size: 18px; }
    .modal-body { padding: 18px 24px 8px; overflow-y: auto; }
    .form-section-title {
      font-weight: 500; margin: 4px 0 14px; padding-left: 8px;
      border-left: 3px solid var(--primary);
    }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 14px 16px;
      margin-bottom: 8px;
    }
    .form-grid.two { grid-template-columns: 1fr 1fr; }
    /* 弹框字段：名称左 + 控件右（与筛选区一致，禁止上下叠） */
    .form-item {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
    .form-item .form-label {
      flex: 0 0 132px;
      width: 132px;
      text-align: right;
      padding: 0;
      white-space: nowrap;
    }
    .form-grid.two .form-item .form-label {
      flex: 0 0 160px;
      width: 160px;
    }
    .form-item .form-control,
    .form-item .form-field {
      flex: 1;
      min-width: 0;
      width: auto;
    }
    .form-row { display: flex; align-items: flex-start; margin-bottom: 18px; }
    .form-label {
      width: 180px; text-align: right; padding-right: 10px; padding-top: 6px; color: var(--text); flex-shrink: 0;
    }
    .form-label.required::before { content: "*"; color: #ff4d4f; margin-right: 4px; }
    .form-control {
      width: 100%; height: 32px; border: 1px solid var(--border); border-radius: 4px;
      padding: 0 11px; outline: none; font-size: 14px; background: #fff;
    }
    .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(24,144,255,.2); }
    .form-control[readonly],
    .form-control:disabled { background: #f5f5f5; color: var(--text-secondary); }
    .form-control.error { border-color: #ff4d4f; }
    .form-field { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 0; }
    .form-help { color: var(--text-secondary); font-size: 12px; }
    .form-error { color: #ff4d4f; font-size: 12px; display: none; }
    .form-error.show { display: block; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 8px; padding: 14px 20px; border-top: 1px solid var(--border); flex-shrink: 0; }

    .rule-row {
      display: grid;
      grid-template-columns: 1.3fr 1fr 1fr auto;
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
    }
    .rule-row .form-item {
      align-items: flex-start;
    }
    .rule-row .form-item .form-label {
      padding-top: 6px;
      flex: 0 0 96px;
      width: 96px;
    }
    .rule-row .form-item .form-field {
      flex: 1;
    }
    .day-range, .deadline-wrap {
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    }
    .day-range .form-control,
    .deadline-wrap .form-control { width: 72px; }
    .deadline-wrap select.form-control { width: 88px; }
    .deadline-inline {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .deadline-inline .form-control { flex: 1; width: auto; }
    .deadline-inline span { color: var(--text); flex-shrink: 0; }
    .icon-btn-sm {
      width: 28px; height: 28px; border-radius: 4px; border: 1px solid var(--border);
      background: #fff; cursor: pointer; color: var(--primary); font-size: 16px; line-height: 1;
    }
    .icon-btn-sm.danger { color: #ff4d4f; }

    .import-box {
      width: 360px;
      border: 1px dashed var(--border);
      border-radius: 4px;
      padding: 24px 16px;
      text-align: center;
      color: var(--text-secondary);
      background: #fafafa;
      cursor: pointer;
    }
    .import-box:hover { border-color: var(--primary); color: var(--primary); }
    .import-actions { margin-top: 12px; display: flex; gap: 12px; }
    .link-btn {
      border: 0; background: transparent; color: var(--primary); cursor: pointer; font-size: 13px; padding: 0;
    }

    .toast {
      position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
      z-index: 30; min-width: 280px; max-width: 560px;
      padding: 10px 16px; border-radius: 4px; color: #fff; font-size: 14px;
      box-shadow: 0 4px 12px rgba(0,0,0,.15);
      display: none; align-items: center; gap: 8px;
    }
    .toast.show { display: flex; }
    .toast.success { background: #52c41a; }
    .toast.error { background: #ff4d4f; }
    .toast.info { background: #1890ff; }

    .panel { display: none; }
    .panel.active { display: block; }
  </style>
</head>
<body>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">L</div>
      <span class="logo-text">数智分拨</span>
    </div>
    <nav class="sidebar-menu">
      <div class="menu-item"><span class="menu-icon">⌂</span><span class="menu-label">首页</span></div>
      <div class="menu-item active">
        <span class="menu-icon">☰</span><span class="menu-label">奖罚处理</span><span class="menu-arrow">▼</span>
      </div>
      <div class="menu-sub">
        <div class="menu-item active">奖罚类型维护</div>
      </div>
      <div class="menu-item"><span class="menu-icon">⚙</span><span class="menu-label">系统设置</span><span class="menu-arrow">▶</span></div>
    </nav>
    <div class="sidebar-toggle" id="sidebarToggle" title="折叠/展开">☰</div>
  </aside>

  <div class="main-wrapper">
    <header class="top-tabs">
      <div class="home-btn" title="首页">⌂</div>
      <div class="page-tabs" id="pageTabs">
        <div class="page-tab active" data-tab="page1">奖罚类型维护 <span class="tab-close">×</span></div>
      </div>
      <div class="top-right">
        <span class="icon-btn" title="搜索">🔍</span>
        <span class="icon-btn" title="通知">🔔</span>
        <div class="avatar" title="用户">U</div>
      </div>
    </header>

    <main class="content-area">
      <div class="content-card">

        <section class="filter-area">
          <div class="filter-grid" id="filterGrid"></div>
          <div class="filter-actions">
            <button class="btn" id="resetBtn" type="button">重置</button>
            <button class="btn btn-primary" id="queryBtn" type="button">查询</button>
          </div>
        </section>

        <nav class="content-tabs" id="contentTabs">
          <div class="content-tab" data-ctab="type">类型维护</div>
          <div class="content-tab" data-ctab="typeSpecial">特殊维护</div>
          <div class="content-tab active" data-ctab="total">个人总额限额维护</div>
        </nav>

        <section class="action-bar">
          <button class="btn-action primary" id="addBtn" type="button">新增</button>
          <button class="btn-action" id="editBtn" type="button">编辑</button>
          <button class="btn-action" id="deleteBtn" type="button">删除</button>
          <button class="btn-action" id="exportBtn" type="button">导出</button>
          <button class="btn-action hidden" id="importBtn" type="button">导入</button>
        </section>

        <section class="table-area">
          <div class="table-scroll">
            <table class="data-table" id="dataTable">
              <thead><tr id="tableHead"></tr></thead>
              <tbody id="tableBody"></tbody>
            </table>
          </div>
          <div class="pagination">
            <span class="total" id="pageTotal">共 1 条</span>
            <button class="page-btn disabled" type="button">&lt;</button>
            <button class="page-btn active" type="button">1</button>
            <button class="page-btn disabled" type="button">&gt;</button>
            <div class="page-jump">跳至 <input type="text" value="1" /> 页</div>
          </div>
        </section>

      </div>
    </main>
  </div>
</div>

<!-- 类型维护弹框（对照线上现有弹框） -->
<div class="modal-mask" id="typeModalMask">
  <section class="modal xwide" role="dialog" aria-modal="true">
    <div class="modal-header">
      <span id="typeModalTitle">新增</span>
      <button class="modal-close" data-close="typeModalMask" type="button">×</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <!-- 第1行 -->
        <div class="form-item">
          <label class="form-label">奖罚类型</label>
          <select class="form-control" id="typeCategory">
            <option value="">请选择</option>
            <option selected>发放转运质量奖金</option>
            <option>扣除转运质量奖金</option>
            <option>发放分拨内部质量奖金</option>
          </select>
        </div>
        <div class="form-item">
          <label class="form-label required">奖罚编码</label>
          <input class="form-control" id="typeCode" type="text" placeholder="请输入内容" />
        </div>
        <div class="form-item">
          <label class="form-label required">奖罚名称</label>
          <input class="form-control" id="typeName" type="text" placeholder="请输入内容" />
        </div>

        <!-- 第2行 -->
        <div class="form-item">
          <label class="form-label required">负责人</label>
          <input class="form-control" id="typeOwner" type="text" placeholder="请输入内容" />
        </div>
        <div class="form-item">
          <label class="form-label">名称拼音</label>
          <input class="form-control" id="typePinyin" type="text" disabled />
        </div>
        <div class="form-item">
          <label class="form-label required">手动录入</label>
          <select class="form-control" id="typeManual">
            <option>是</option>
            <option>否</option>
          </select>
        </div>

        <!-- 第3行 -->
        <div class="form-item">
          <label class="form-label required">允许查询</label>
          <select class="form-control" id="typeAllowRefresh">
            <option>是</option>
            <option>否</option>
          </select>
        </div>
        <div class="form-item">
          <label class="form-label">自动录入</label>
          <select class="form-control" id="typeAutoEntry" disabled>
            <option>否</option>
            <option>是</option>
          </select>
        </div>
        <div class="form-item">
          <label class="form-label required">单人每月金额限制</label>
          <input class="form-control" id="typeLimit" type="text" placeholder="请输入内容" />
        </div>

        <!-- 第4行 -->
        <div class="form-item">
          <label class="form-label">自动分配</label>
          <select class="form-control" id="typeAutoAssign" disabled>
            <option>否</option>
            <option>是</option>
          </select>
        </div>
        <div class="form-item">
          <label class="form-label required">录入截止日期</label>
          <div class="deadline-inline">
            <input class="form-control" id="typeEntryDeadline" type="text" placeholder="请输入" />

  function confirmTypeModal() {
    const category = document.getElementById('typeCategory').value;
    const code = document.getElementById('typeCode').value.trim();
    const name = document.getElementById('typeName').value.trim();
    const owner = document.getElementById('typeOwner').value.trim();
    const limit = document.getElementById('typeLimit').value.trim();
    const entryDeadline = document.getElementById('typeEntryDeadline').value.trim();
    const handleDeadline = document.getElementById('typeHandleDeadline').value.trim();

    if (!category || !code || !name || !owner || !limit || !entryDeadline || !handleDeadline) {
      showToast('请完善必填项', 'error');
      return;
    }
    if (!/^\d+(\.\d{1,2})?$/.test(limit) || Number(limit) <= 0 || Number(limit) > 99999.99) {
      showToast('单人每月金额限制格式不正确', 'error');
      return;
    }

    const payload = {
      category,
      code,
      name,
      pinyin: document.getElementById('typePinyin').value.trim() || code,
      limit: formatLimit(limit),
      owner,
      entryDeadline,
      handleDeadline,
      manual: document.getElementById('typeManual').value,
      allowRefresh: document.getElementById('typeAllowRefresh').value,
      autoEntry: document.getElementById('typeAutoEntry').value,
      autoAssign: document.getElementById('typeAutoAssign').value,
      rebrush: document.getElementById('typeRebrush').value,
      push: document.getElementById('typePush').value
    };

    if (state.modalMode === 'add') {
      const exists = state.typeRows.some((row) => row.category === category && row.name === name);
      if (exists) {
        showToast('数据已维护，无法重复维护', 'error');
        return;
      }
      state.typeRows.push({
        ...payload,
        creator: '当前登录人',
        createTime: nowText(),
        modifier: '',
        modifyTime: ''
      });
      showToast('保存成功', 'success');
    } else {
      const row = state.typeRows[state.editingIndex];
      Object.assign(row, payload, {
        modifier: '当前登录人',
        modifyTime: nowText()
      });
      showToast('修改成功', 'success');

    closeMask('typeModalMask');
    renderTable();

  function renderRuleRows(rules) {
    const list = document.getElementById('ruleList');
    list.innerHTML = rules.map((rule, index) => `
      <div class="rule-row" data-rule-index="${index}">
        <div class="form-item">
          <label class="form-label required">发生时间</label>
          <div class="form-field">
            <div class="day-range">
              <input class="form-control rule-start" type="text" value="${rule.occurStart}" />
              <span>号</span><span>-</span>
              <input class="form-control rule-end" type="text" value="${rule.occurEnd}" />
              <span>号</span>
            </div>
            <span class="form-error ${Number(rule.occurStart) > Number(rule.occurEnd) ? 'show' : ''}">开始日期不可大于结束日期</span>
          </div>
        </div>
        <div class="form-item">
          <label class="form-label required">录入截止日期</label>
          <div class="form-field">
            <div class="deadline-wrap">
              <select class="form-control rule-entry-month">
                <option ${rule.entryMonth === '当月' ? 'selected' : ''}>当月</option>
                <option ${rule.entryMonth === '次月' ? 'selected' : ''}>次月</option>
              </select>
              <input class="form-control rule-entry-day" type="text" value="${rule.entryDay}" />
              <span>号</span>
            </div>
          </div>
        </div>
        <div class="form-item">
          <label class="form-label required">处理截止日期</label>
          <div class="form-field">
            <div class="deadline-wrap">
              <select class="form-control rule-handle-month">
                <option ${rule.handleMonth === '当月' ? 'selected' : ''}>当月</option>
                <option ${rule.handleMonth === '次月' ? 'selected' : ''}>次月</option>
              </select>
              <input class="form-control rule-handle-day" type="text" value="${rule.handleDay}" />
              <span>号</span>
            </div>
          </div>
        </div>
        <div style="display:flex; gap:6px; align-items:center;">
          <button class="icon-btn-sm" type="button" data-rule-add>+</button>
          <button class="icon-btn-sm danger" type="button" data-rule-remove>-</button>
        </div>
      </div>`).join('');

    list.querySelectorAll('[data-rule-add]').forEach((btn) => {
      btn.addEventListener('click', () => {
        const current = collectRules();
        current.push({
          occurStart: '1', occurEnd: '31',
          entryMonth: '当月', entryDay: '1',
          handleMonth: '次月', handleDay: '5'
        });
        renderRuleRows(current);
      });
    });
    list.querySelectorAll('[data-rule-remove]').forEach((btn) => {
      btn.addEventListener('click', () => {
        const current = collectRules();
        if (current.length <= 1) {
          showToast('至少保留一条规则信息', 'info');
          return;
        }
        const index = Number(btn.closest('.rule-row').dataset.ruleIndex);
        current.splice(index, 1);
        renderRuleRows(current);
      });
    });
  }

  function collectRules() {
    return Array.from(document.querySelectorAll('#ruleList .rule-row')).map((row) => ({
      occurStart: row.querySelector('.rule-start').value.trim(),
      occurEnd: row.querySelector('.rule-end').value.trim(),
      entryMonth: row.querySelector('.rule-entry-month').value,
      entryDay: row.querySelector('.rule-entry-day').value.trim(),
      handleMonth: row.querySelector('.rule-handle-month').value,
      handleDay: row.querySelector('.rule-handle-day').value.trim()
    }));
  }

    state.modalMode = mode;

  function confirmTypeSpecialModal() {
    const branch = document.getElementById('spBranch').value;
    const category = document.getElementById('spCategory').value;
    const name = document.getElementById('spName').value;
    const limit = document.getElementById('spLimit').value.trim();
    const rules = collectRules();

    if (!branch || !category || !name || !limit) {
      showToast('请完善基础信息必填项', 'error');
      return;
    }
    if (!/^\d+(\.\d{1,2})?$/.test(limit) || Number(limit) <= 0 || Number(limit) > 99999.99) {
      showToast('分拨单人每月金额限制格式不正确', 'error');
      return;
    }
    for (const rule of rules) {
      if (!rule.occurStart || !rule.occurEnd || !rule.entryDay || !rule.handleDay) {
        showToast('请完善规则信息', 'error');
        return;
      }
      if (Number(rule.occurStart) > Number(rule.occurEnd)) {
        showToast('开始日期不可大于结束日期', 'error');
        renderRuleRows(rules);
        return;
      }
    }

    const existsIndex = state.typeSpecialRows.findIndex(
      (row) => row.branch === branch && row.category === category && row.name === name
    );
    if (state.modalMode === 'add' && existsIndex > -1) {
      showToast('数据已维护，无法重复维护', 'error');
      return;
    }

    const firstRule = rules[0];
    const payload = {
      branch,
      category,
      name,
      limit: formatLimit(limit),
      originLimit: findTypeLimit(category, name) || document.getElementById('spOriginLimit').value || '0.00',
      occurStart: firstRule.occurStart,
      occurEnd: firstRule.occurEnd,
      entryMonth: firstRule.entryMonth,
      entryDay: firstRule.entryDay,
      handleMonth: firstRule.handleMonth,
      handleDay: firstRule.handleDay
    };

    if (state.modalMode === 'add') {
      state.typeSpecialRows.push({
        ...payload,
        creator: '当前登录人',
        createTime: nowText(),
        modifier: '',
        modifyTime: ''
      });
      showToast('保存成功', 'success');
    } else {
      const row = state.typeSpecialRows[state.editingIndex];
      Object.assign(row, payload, {
        modifier: '当前登录人',
        modifyTime: nowText()
      });
      showToast('修改成功', 'success');
    }
    closeMask('typeSpecialModalMask');
    renderTable();
  }

      document.getElementById('totalLimitInput').value = '';

  function confirmTotalModal() {
    const isSpecial = document.getElementById('totalScope').value === 'special';
    const limitValue = document.getElementById('totalLimitInput').value.trim();
    document.getElementById('totalLimitError').classList.remove('show');
    document.getElementById('totalBranchError').classList.remove('show');
    document.getElementById('totalLimitInput').classList.remove('error');
    document.getElementById('totalBranch').classList.remove('error');

    if (!limitValue || !/^\d+(\.\d{1,2})?$/.test(limitValue) || Number(limitValue) <= 0 || Number(limitValue) > 99999.99) {
      document.getElementById('totalLimitError').textContent = '请输入正确的金额，最大 99999.99';
      document.getElementById('totalLimitError').classList.add('show');
      document.getElementById('totalLimitInput').classList.add('error');
      return;
    }

    if (!isSpecial) {
      if (state.modalMode === 'add' && state.totalRows.length > 0) {
        showToast('数据已维护，无法重复维护', 'error');
        return;
      }
      const formatted = formatLimit(limitValue);
      if (state.modalMode === 'add') {
        state.totalRows = [{
          limit: formatted,
          creator: '当前登录人',
          createTime: nowText(),
          modifier: '',
          modifyTime: ''
        }];
        showToast('保存成功', 'success');
      } else {
        const row = state.totalRows[Number(String(state.editingIndex).replace('u-', ''))];
        row.limit = formatted;
        row.modifier = '当前登录人';
        row.modifyTime = nowText();
        showToast('修改成功', 'success');
      }
      closeMask('totalModalMask');
      renderTable();
      return;
    }

    const branch = document.getElementById('totalBranch').value;
    if (!branch) {
      document.getElementById('totalBranchError').classList.add('show');
      document.getElementById('totalBranch').classList.add('error');
      return;
    }
    const existsIndex = state.totalSpecialRows.findIndex((row) => row.branch === branch);
    if (state.modalMode === 'add' && existsIndex > -1) {
      showToast('数据已维护，无法重复维护', 'error');
      return;
    }

    const formatted = formatLimit(limitValue);
    if (state.modalMode === 'add') {
      state.totalSpecialRows.push({
        branch,
        limit: formatted,
        creator: '当前登录人',
        createTime: nowText(),
        modifier: '',
        modifyTime: ''
      });
      showToast('保存成功', 'success');
    } else {
      const row = state.totalSpecialRows[Number(String(state.editingIndex).replace('s-', ''))];
      row.limit = formatted;
      row.modifier = '当前登录人';
      row.modifyTime = nowText();
      showToast('修改成功', 'success');
    }
    closeMask('totalModalMask');
    renderTable();
  }

        document.getElementById('deleteModalText').textContent =
          `确认删除选中的 ${count} 条分拨特殊限额吗？删除后，该分拨将使用全国统一限额；未维护全国统一限额时不校验个人总额限额。`;

      state.typeSpecialRows = state.typeSpecialRows.filter((_, index) => !selected.includes(String(index)));

      const unifiedIndexes = selected.filter((key) => key.startsWith('u-')).map((key) => Number(key.replace('u-', '')));

      state.totalRows = state.totalRows.filter((_, index) => !unifiedIndexes.includes(index));
      state.totalSpecialRows = state.totalSpecialRows.filter((_, index) => !specialIndexes.includes(index));

  document.getElementById('mockFileBtn').addEventListener('click', () => {
    state.importFileName = '分拨特殊限额导入.xlsx';
    document.getElementById('importFileName').textContent = state.importFileName;
    document.getElementById('importError').classList.remove('show');
  });
  document.getElementById('importBox').addEventListener('click', () => {
    document.getElementById('mockFileBtn').click();
  });
  document.getElementById('importConfirmBtn').addEventListener('click', () => {
    if (!state.importFileName) {
      document.getElementById('importError').classList.add('show');
      return;
    }
    const exists = state.totalSpecialRows.some((row) => row.branch === '广州分拨中心');
    if (!exists) {
      state.totalSpecialRows.push({
        branch: '广州分拨中心',
        limit: '1800.00',
        creator: '当前登录人',
        createTime: nowText(),
        modifier: '',
        modifyTime: ''
      });
    }
    closeMask('importModalMask');
    renderTable();
    showToast('导入成功（演示）', 'success');
  });

  document.querySelectorAll('[data-close]').forEach((btn) => {
    btn.addEventListener('click', () => closeMask(btn.dataset.close));
  });
  document.querySelectorAll('.modal-mask').forEach((mask) => {
    mask.addEventListener('click', (e) => {
      if (e.target === mask) closeMask(mask.id);
    });
  });

  renderTable();
</script>

</body>
</html>
